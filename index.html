<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelbongoo — Prépa 30/04</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2d6a2d;--green-bg:#e8f5e8;--green-bdr:#b8dfb8;
  --blue:#1a4b8c;--blue-bg:#e3ecf8;--blue-bdr:#b8d0ef;
  --red:#b71c1c;--red-bg:#fdecea;--red-bdr:#f0b0b0;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-bdr:#fcd34d;
  --orange:#c84b00;--orange-bg:#fff3e0;
  --border:#e0e0e0;--bg:#f4f5f9;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#222;font-size:14px;}
#hdr{background:#1a3a5c;color:#fff;padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
#hdr h1{font-size:15px;font-weight:700;}
#hdr .date{font-size:12px;opacity:.6;}
#sync-pill{margin-left:auto;font-size:11px;display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,.13);white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.dot.syncing{background:#ff9800;animation:blink .7s infinite;}
.dot.err{background:#f44336;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#mode-bar{background:#1a3a5c;border-bottom:2px solid rgba(255,255,255,.1);display:flex;position:sticky;top:50px;z-index:199;}
.mbtab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.mbtab.active{color:#fff;border-bottom-color:#fff;}
#search-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:none;position:sticky;top:82px;z-index:198;}
#search-input{width:100%;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:14px;outline:none;background:#f9f9f9;}
#search-input:focus{border-color:var(--blue);background:#fff;}
#site-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;position:sticky;top:82px;z-index:198;align-items:center;}
.sbtn{padding:5px 11px;border-radius:16px;border:1.5px solid #ccc;background:#f7f7f7;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap;line-height:1.5;}
.sbtn:hover{background:#eee;}
.sbtn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.sbtn.dom-btn.active{background:var(--green);border-color:var(--green);}
.sbtn .prog{font-size:10px;font-weight:400;opacity:.8;margin-left:3px;}
.sbtn .prog.complet{color:#4caf50;opacity:1;font-weight:700;}
.btn-termine{margin-left:auto;padding:6px 14px;border-radius:16px;border:none;background:#e53e3e;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-termine:hover{background:#c53030;}
#stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 16px;background:#fff;border-bottom:1px solid #eee;}
.sp{background:var(--bg);border-radius:6px;padding:3px 10px;font-size:12px;}
.sp b{color:var(--blue);}
.sp.dom b{color:var(--green);}
.prog-wrap{flex:1;min-width:80px;height:5px;background:#ddd;border-radius:3px;overflow:hidden;}
.prog-fill{height:5px;border-radius:3px;background:var(--blue);transition:width .4s;}
.prog-fill.dom{background:var(--green);}
.prog-pct{font-size:12px;font-weight:700;color:#555;white-space:nowrap;}
#layout{display:flex;height:calc(100vh - 130px);overflow:hidden;}
#left{flex:1;overflow-y:auto;padding:12px 12px 32px;}
#right{width:285px;overflow-y:auto;background:#fff;border-left:1px solid var(--border);padding:10px;flex-shrink:0;}
#right-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:300;background:var(--blue);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:20px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.3);}
@media(max-width:700px){
  #right{display:none;position:fixed;top:50px;right:0;bottom:0;z-index:150;box-shadow:-3px 0 12px rgba(0,0,0,.15);}
  #right.open{display:block;}
  #right-toggle{display:flex;align-items:center;justify-content:center;}
}
.sec-lbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;padding:4px 0;border-bottom:2px solid #eee;margin-bottom:8px;}
.pcard{background:#fff;border:1px solid #e4e4e4;border-radius:8px;padding:10px 12px;margin-bottom:7px;transition:opacity .25s;}
.pcard.all-done{opacity:.32;}
.pname{font-size:13px;font-weight:700;color:#111;line-height:1.3;margin-bottom:1px;}
.pname mark{background:#fff3b0;border-radius:3px;padding:0 2px;font-style:normal;}
.psub{font-size:11px;color:#bbb;margin-bottom:8px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
/* Chip principal */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;user-select:none;border:1.5px solid transparent;transition:all .18s;line-height:1.3;}
.chip.n{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bdr);}
.chip.g{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr);}
.chip:hover{filter:brightness(.92);transform:scale(.98);}
.chip.done{background:var(--red-bg)!important;color:var(--red)!important;border-color:var(--red-bdr)!important;text-decoration:line-through;opacity:.55;}
.chip.rupture{background:#fef3c7!important;color:#92400e!important;border-color:#fcd34d!important;text-decoration:line-through;opacity:.7;}
.chip .cnum{font-weight:800;}
.chip .cclient{font-weight:500;}
/* Boutons action sous le chip */
.chip-actions{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.btn-action{padding:2px 8px;font-size:10px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#666;cursor:pointer;transition:all .15s;}
.btn-action:hover{background:#f0f0f0;}
.btn-action.rupture{border-color:#fcd34d;color:#92400e;background:#fffbeb;}
.btn-action.rupture.active{background:#fef3c7;border-color:#f59e0b;font-weight:700;}
.btn-action.poids{border-color:var(--blue-bdr);color:var(--blue);}
.btn-action.poids.active{background:var(--blue-bg);font-weight:700;}
/* Mini form poids */
.poids-form{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
.poids-form input{width:80px;padding:3px 7px;border:1.5px solid var(--blue-bdr);border-radius:6px;font-size:12px;outline:none;}
.poids-form input:focus{border-color:var(--blue);}
.poids-form span{font-size:11px;color:#888;}
.poids-form button{padding:3px 8px;font-size:11px;border-radius:6px;border:none;background:var(--blue);color:#fff;cursor:pointer;}
/* Ligne produit dans chip avec anomalie */
.chip-row{display:flex;flex-direction:column;gap:3px;padding:4px 0;}
/* Site group header in search */
.site-group-hdr{font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:6px;background:var(--blue);display:inline-block;margin:12px 0 6px;}
.site-group-hdr.dom{background:var(--green);}
/* Client panel */
.crow{display:flex;align-items:flex-start;padding:7px 2px;border-bottom:1px solid #f2f2f2;gap:5px;}
.crow:last-child{border-bottom:none;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmeta{font-size:10px;color:#bbb;}
.cprev{font-size:9px;color:#ccc;margin-top:1px;}
.cbadges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.cbadge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:9px;font-size:11px;font-weight:700;border:1px solid transparent;white-space:nowrap;}
.cbadge.n{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bdr);}
.cbadge.g{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr);}
.btn-full{padding:4px 9px;font-size:11px;border:1px solid #ddd;border-radius:5px;background:#fafafa;color:#888;cursor:pointer;white-space:nowrap;margin-top:2px;}
.btn-full:hover{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
.no-results{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px;}
/* MODAL RECAP */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;overflow-y:auto;padding:20px;}
#modal-overlay.show{display:block;}
#modal{background:#fff;border-radius:12px;max-width:700px;margin:0 auto;padding:0;overflow:hidden;}
#modal-hdr{background:#1a3a5c;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
#modal-hdr h2{font-size:16px;font-weight:700;}
#modal-body{padding:20px;}
.recap-site{margin-bottom:24px;}
.recap-site h3{font-size:14px;font-weight:700;color:#1a3a5c;padding-bottom:6px;border-bottom:2px solid #e3ecf8;margin-bottom:10px;}
.recap-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f5f5f5;gap:10px;font-size:13px;}
.recap-row:last-child{border-bottom:none;}
.recap-prod{flex:1;color:#333;}
.recap-client{font-size:12px;color:#888;}
.badge-rupture{background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-poids{background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;}
.no-anomalie{color:#aaa;font-size:13px;font-style:italic;}
.btn-print{padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-right:10px;}
.btn-close-modal{padding:8px 20px;background:#f0f0f0;color:#333;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;}
#loading{position:fixed;inset:0;background:#1a3a5c;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
#loading h2{font-size:18px;}
#loading p{font-size:13px;opacity:.7;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{#modal-overlay{position:static;background:none;padding:0;}#modal{box-shadow:none;border-radius:0;max-width:100%;}#modal-hdr .btn-print,#modal-hdr .btn-close-modal{display:none;}}
</style>
</head>

const ckey=(s,c)=>s+"||"+c;

const getCasiers=(s,c)=>casierMap[ckey(s,c)]||[1];
const getPrev=(s,c)=>casierMap[ckey(s,c)+"__prev"]||[];
const pfx=s=>s==="DOM"?"Carton":"Casier";
const isDOM=s=>!!(SITES_INFO[s]&&SITES_INFO[s].dom);
const isProductDone=(s,c,p)=>!!doneProducts[pkey(s,c,p)];
const isRupture=(s,c,p)=>!!ruptures[pkey(s,c,p)];
const isWeighable=(type)=>WEIGHABLE_TYPES.has(type);

function doneProductCount(site){
  return ORDERS.filter(o=>o.lieu===site&&(isProductDone(site,o.client,o.product)||isRupture(site,o.client,o.product))).length;
}
function totalProductCount(site){
  return ORDERS.filter(o=>o.lieu===site).length;
}

function getCasierForProduct(site,client,product){
  const all=getCasiers(site,client);
  if(all.length===1)return all[0];
  if(isProductDone(site,client,product)||isRupture(site,client,product)){
    const prev=getPrev(site,client);
    return prev.length>0?prev[0]:all[0];
  }
  return all[all.length-1];
}

// Firebase
function initFirebase(){
  setLoadTxt("Connexion à Firebase...");
  try{
    firebase.initializeApp({databaseURL:FIREBASE_URL});
    db=firebase.database();
    dbRef=db.ref("prep_3004v3");
    dbRef.on("value",snap=>{
      const data=snap.val();
      if(data){
        if(data.doneProducts)  doneProducts=data.doneProducts;
        if(data.ruptures)      ruptures=data.ruptures;
        if(data.poidsAnomalies)poidsAnomalies=data.poidsAnomalies;
        if(data.casierMap)     casierMap=data.casierMap;
        if(data.counters)      counters=data.counters;
      }
      showApp();renderAll();
    },err=>{
      setLoadTxt("Erreur: "+err.message);
      setSyncUI("err","Hors-ligne");
      showApp();renderAll();
    });
  }catch(e){
    setLoadTxt("Erreur: "+e.message);
    setTimeout(()=>{showApp();renderAll();},1500);
  }
}
function showApp(){
  document.getElementById("loading").style.display="none";
  document.getElementById("hdr").style.display="flex";
  document.getElementById("mode-bar").style.display="flex";
  document.getElementById("site-bar").style.display="flex";
  document.getElementById("stats").style.display="flex";
  document.getElementById("layout").style.display="flex";
  setSyncUI("ok","Connecté ✓");
}
function setLoadTxt(t){document.getElementById("loading-txt").textContent=t;}
function setSyncUI(st,txt){
  document.getElementById("sdot").className="dot"+(st==="syncing"?" syncing":st==="err"?" err":"");
  document.getElementById("stxt").textContent=txt;
}
function pushState(){
  if(!dbRef)return;
  setSyncUI("syncing","Sauvegarde...");
  dbRef.set({doneProducts,ruptures,poidsAnomalies,casierMap,counters})
    .then(()=>setSyncUI("ok","Synchronisé ✓"))
    .catch(()=>setSyncUI("err","Erreur sync"));
}

// Actions
function toggleProduct(site,client,product){
  const k=pkey(site,client,product);
  if(doneProducts[k])delete doneProducts[k];
  else{doneProducts[k]=true;delete ruptures[k];}
  renderAll();pushState();
}
function toggleRupture(site,client,product){
  const k=pkey(site,client,product);
  if(ruptures[k])delete ruptures[k];
  else{ruptures[k]=true;delete doneProducts[k];}
  renderAll();pushState();
}
function savePoids(site,client,product,val){
  const k=pkey(site,client,product);
  if(val&&val.trim()){
    poidsAnomalies[k]=val.trim();
    doneProducts[k]=true;
    delete ruptures[k];
  }else{
    delete poidsAnomalies[k];
  }
  delete showPoidsForm[k];
  renderAll();pushState();
}
function togglePoidsForm(site,client,product){
  const k=pkey(site,client,product);
  if(showPoidsForm[k])delete showPoidsForm[k];
  else showPoidsForm[k]=true;
  renderAll();
}
function markFull(site,client){
  const k=ckey(site,client);
  const cur=getCasiers(site,client);
  const newNum=counters[site]++;
  casierMap[k+"__prev"]=[...(casierMap[k+"__prev"]||[]),...cur];
  casierMap[k]=[...cur,newNum];
  renderAll();
  toast(pfx(site)+" "+newNum+" créé pour "+client.split(" ")[0]);
  pushState();
}

function showRecap(site){
  const so=ORDERS.filter(o=>o.lieu===site);
  const info=SITES_INFO[site]||{label:site};
  // Ruptures
  const rupturesList=so.filter(o=>isRupture(site,o.client,o.product));
  // Poids anomalies
  const poidsList=so.filter(o=>poidsAnomalies[pkey(site,o.client,o.product)]);
  // Manquants (ni done ni rupture)
  const manquants=so.filter(o=>!isProductDone(site,o.client,o.product)&&!isRupture(site,o.client,o.product));

  let html="<div class='recap-site'>";
  html+="<h3>"+info.label+"</h3>";

  if(rupturesList.length){
    html+="<div style='font-size:12px;font-weight:700;color:#92400e;margin:8px 0 4px'>🚫 Ruptures ("+rupturesList.length+")</div>";
    rupturesList.forEach(o=>{
      html+="<div class='recap-row'><div class='recap-prod'>"+o.product
        +"<div class='recap-client'>"+o.client+" · qty "+o.qty+"</div></div>"
        +"<span class='badge-rupture'>RUPTURE</span></div>";
    });
  }
  if(poidsList.length){
    html+="<div style='font-size:12px;font-weight:700;color:var(--blue);margin:8px 0 4px'>⚖️ Poids hors fourchette ("+poidsList.length+")</div>";
    poidsList.forEach(o=>{
      const note=poidsAnomalies[pkey(site,o.client,o.product)];
      html+="<div class='recap-row'><div class='recap-prod'>"+o.product
        +"<div class='recap-client'>"+o.client+" · prévu: "+o.type+"</div></div>"
        +"<span class='badge-poids'>"+note+"</span></div>";
    });
  }
  if(manquants.length){
    html+="<div style='font-size:12px;font-weight:700;color:#e53e3e;margin:8px 0 4px'>⚠️ Non traités ("+manquants.length+")</div>";
    manquants.forEach(o=>{
      html+="<div class='recap-row'><div class='recap-prod'>"+o.product
        +"<div class='recap-client'>"+o.client+" · qty "+o.qty+"</div></div>"
        +"<span style='color:#e53e3e;font-size:11px'>non déposé</span></div>";
    });
  }
  if(!rupturesList.length&&!poidsList.length&&!manquants.length){
    html+="<div class='no-anomalie'>✅ Aucune anomalie — toutes les commandes ont été préparées correctement.</div>";
  }
  html+="</div>";

  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("show");}

// Modes
function setMode(mode){
  currentMode=mode;
  document.getElementById("tab-site").classList.toggle("active",mode==="site");
  document.getElementById("tab-search").classList.toggle("active",mode==="search");
  document.getElementById("search-bar").style.display=mode==="search"?"block":"none";
  document.getElementById("site-bar").style.display=mode==="site"?"flex":"none";
  document.getElementById("stats").style.display=mode==="site"?"flex":"none";
  document.getElementById("right").style.display=mode==="search"?"none":"";
  document.getElementById("right-toggle").style.display=mode==="search"?"none":"";
  document.getElementById("layout").style.height="calc(100vh - "+(mode==="search"?148:130)+"px)";
  if(mode==="search")setTimeout(()=>document.getElementById("search-input").focus(),100);
  renderAll();
}
function onSearch(){
  searchQuery=document.getElementById("search-input").value.trim().toLowerCase();
  renderSearchResults();
}

function renderAll(){
  buildTabs();
  if(currentMode==="site"){renderStats();renderProducts();renderClients();}
  else renderSearchResults();
}

function buildTabs(){
  const sites=[...new Set(ORDERS.map(o=>o.lieu))].sort();
  const bar=document.getElementById("site-bar");
  if(!bar.children.length){
    sites.forEach((site,i)=>{
      const btn=document.createElement("button");
      btn.className="sbtn"+(isDOM(site)?" dom-btn":"");
      btn.dataset.site=site;
      btn.onclick=()=>selectSite(site);
      bar.appendChild(btn);
      if(i===0)currentSite=site;
    });
    // Bouton terminer
    const bterm=document.createElement("button");
    bterm.className="btn-termine";
    bterm.id="btn-termine";
    bterm.textContent="✅ Préparation terminée";
    bterm.onclick=()=>showRecap(currentSite);
    bar.appendChild(bterm);
  }
  bar.querySelectorAll(".sbtn").forEach(btn=>{
    const site=btn.dataset.site;
    const info=SITES_INFO[site]||{label:site};
    const total=totalProductCount(site);
    const done=doneProductCount(site);
    const ok=done===total&&total>0;
    btn.classList.toggle("active",site===currentSite);
    btn.innerHTML=info.label+"<span class="prog"+(ok?" complet":"")+"">"+(done)+"/"+total+(ok?" ✓":"")+"</span>";
  });
}

function renderStats(){
  const s=currentSite;if(!s)return;
  const so=ORDERS.filter(o=>o.lieu===s);
  const nc=new Set(so.map(o=>o.client)).size;
  const np=new Set(so.map(o=>o.product)).size;
  const ni=so.reduce((a,o)=>a+o.qty,0);
  const total=totalProductCount(s);
  const done=doneProductCount(s);
  const pct=total?Math.round(done/total*100):0;
  const dc=isDOM(s)?"dom":"";
  const nrupt=so.filter(o=>isRupture(s,o.client,o.product)).length;
  const npoids=so.filter(o=>poidsAnomalies[pkey(s,o.client,o.product)]).length;
  document.getElementById("stats").innerHTML=
    "<div class="sp "+dc+""><b>"+nc+"</b> clients</div>"
    +"<div class="sp "+dc+""><b>"+done+"/"+total+"</b> déposés</div>"
    +(nrupt?"<div class="sp" style="background:#fef3c7"><b style='color:#92400e'>"+nrupt+"</b> rupture"+(nrupt>1?"s":"")+"</div>":"")
    +(npoids?"<div class="sp" style="background:var(--blue-bg)"><b style='color:var(--blue)'>"+npoids+"</b> poids ⚖️</div>":"")
    +"<div class="prog-wrap"><div class="prog-fill "+dc+"" style="width:"+pct+"%"></div></div>"
    +"<span class="prog-pct">"+pct+"%</span>";
}

// Construit une ligne produit avec chip + boutons action
function buildProductLine(site, o){
  const k=pkey(site,o.client,o.product);
  const dom=isDOM(site);
  const cls=dom?"g":"n";
  const casierNum=getCasierForProduct(site,o.client,o.product);
  const done=isProductDone(site,o.client,o.product);
  const rupt=isRupture(site,o.client,o.product);
  const poids=poidsAnomalies[k];
  const weighable=isWeighable(o.type);
  const showPoids=showPoidsForm[k];

  let chipCls="chip "+cls+(done?" done":rupt?" rupture":"");
  const qt=o.qty>1?" x"+o.qty:"";
  const fn=o.client.split(" ")[0];

  const chipStr="<span class=""+chipCls+"" onclick="toggleProduct('"+site+"','"+o.client.replace(/'/g,"&#39;")+"','"+o.product.replace(/'/g,"&#39;")+"')">"
    +"<span class="cnum">"+pfx(site)+" "+casierNum+"</span>"
    +"<span class="cclient"> — "+fn+qt+"</span>"+(done?" ✓":rupt?" 🚫":"")
    +"</span>";

  let actionsStr="<div class="chip-actions">";
  actionsStr+="<button class="btn-action rupture"+(rupt?" active":"")+"" onclick="toggleRupture('"+site+"','"+o.client.replace(/'/g,"&#39;")+"','"+o.product.replace(/'/g,"&#39;")+"')">🚫 Rupture</button>";
  if(weighable){
    actionsStr+="<button class="btn-action poids"+(poids?" active":"")+"" onclick="togglePoidsForm('"+site+"','"+o.client.replace(/'/g,"&#39;")+"','"+o.product.replace(/'/g,"&#39;")+"')">⚖️ "+(poids?poids:"Poids")+"</button>";
  }
  actionsStr+="</div>";

  let poidsFormStr="";
  if(showPoids&&weighable){
    const cur=poids||"";
    poidsFormStr="<div class="poids-form">"
      +"<input id="pf_"+k.replace(/[|]/g,"_")+"" type="text" placeholder="ex: 320g" value=""+cur+"">"
      +"<span>Prévu: "+o.type+"</span>"
      +"<button onclick="savePoids('"+site+"','"+o.client.replace(/'/g,"&#39;")+"','"+o.product.replace(/'/g,"&#39;")+"',document.getElementById('pf_"+k.replace(/[|]/g,"_")+"').value)">OK</button>"
      +"</div>";
  }

  return "<div class="chip-row">"+chipStr+actionsStr+poidsFormStr+"</div>";
}

function renderProductCard(site, product, po, searchMode){
  const totalQty=po.reduce((a,o)=>a+o.qty,0);
  const allDone=po.every(o=>isProductDone(site,o.client,o.product)||isRupture(site,o.client,o.product));
  const pname=searchMode?highlightText(product,searchQuery):product;

  const card=document.createElement("div");
  card.className="pcard"+(allDone?" all-done":"");
  let inner="<div class="pname">"+pname+"</div>"
    +"<div class="psub">"+po[0].producer+" · "+po[0].type+" · <b>"+totalQty+" unité"+(totalQty>1?"s":"")+" au total</b></div>"
    +"<div class="chips">";
  po.forEach(o=>{ inner+=buildProductLine(site,o); });
  inner+="</div>";
  card.innerHTML=inner;
  return card;
}

function renderProducts(){
  const site=currentSite;if(!site)return;
  const so=ORDERS.filter(o=>o.lieu===site);
  const products=[...new Set(so.map(o=>o.product))].sort();
  const cont=document.getElementById("prod-list");
  cont.innerHTML="";
  products.forEach(product=>{
    const po=so.filter(o=>o.product===product);
    cont.appendChild(renderProductCard(site,product,po,false));
  });
}

function highlightText(text,query){
  if(!query)return text;
  const esc=query.replace(/[-[\]{}()*+?.,\^$|#\s]/g,"\$&");
  try{return text.replace(new RegExp("("+esc+")","gi"),"<mark>$1</mark>");}
  catch(e){return text;}
}

function renderSearchResults(){
  const cont=document.getElementById("prod-list");
  cont.innerHTML="";
  if(!searchQuery||searchQuery.length<2){
    cont.innerHTML="<div class="no-results">Tapez au moins 2 caractères pour rechercher sur tous les sites</div>";
    return;
  }
  const sites=[...new Set(ORDERS.map(o=>o.lieu))].sort();
  let found=0;
  sites.forEach(site=>{
    const so=ORDERS.filter(o=>o.lieu===site);
    const matching=[...new Set(so.filter(o=>o.product.toLowerCase().includes(searchQuery)).map(o=>o.product))].sort();
    if(!matching.length)return;
    found+=matching.length;
    const info=SITES_INFO[site]||{label:site};
    const hdr=document.createElement("div");
    hdr.className="site-group-hdr"+(isDOM(site)?" dom":"");
    hdr.textContent=info.label;
    cont.appendChild(hdr);
    matching.forEach(product=>{
      const po=so.filter(o=>o.product===product);
      cont.appendChild(renderProductCard(site,product,po,true));
    });
  });
  if(!found)cont.innerHTML="<div class="no-results">Aucun résultat pour <b>"+searchQuery+"</b></div>";
}

function renderClients(){
  const site=currentSite;if(!site)return;
  const dom=isDOM(site);
  const clients=[...new Set(ORDERS.filter(o=>o.lieu===site).map(o=>o.client))].sort();
  const cont=document.getElementById("client-list");
  cont.innerHTML="";
  const cls=dom?"g":"n";
  clients.forEach(client=>{
    const nums=getCasiers(site,client);
    const prev=getPrev(site,client);
    const ords=ORDERS.filter(o=>o.lieu===site&&o.client===client);
    const na=ords.reduce((a,o)=>a+o.qty,0);
    const np=new Set(ords.map(o=>o.product)).size;
    const ndone=ords.filter(o=>isProductDone(site,client,o.product)||isRupture(site,client,o.product)).length;
    const badges=nums.map(n=>"<span class="cbadge "+cls+"">"+pfx(site)+" "+n+"</span>").join("");
    const prevHtml=prev.length?"<div class="cprev">Préc: "+prev.map(n=>pfx(site)+" "+n).join(", ")+"</div>":"";
    const esc=client.replace(/'/g,"&#39;");
    const row=document.createElement("div");
    row.className="crow";
    row.innerHTML="<div class="cinfo"><div class="cname" title=""+esc+"">"+client+"</div>"
      +"<div class="cmeta">"+ndone+"/"+np+" déposés · "+na+" articles</div>"+prevHtml+"</div>"
      +"<div class="cbadges">"+badges
      +"<button class="btn-full" onclick="markFull('"+site+"','"+esc+"')">📦 Casier plein</button>"
      +"</div>";
    cont.appendChild(row);
  });
}

function selectSite(site){currentSite=site;renderAll();}
function togglePanel(){
  rightOpen=!rightOpen;
  document.getElementById("right").classList.toggle("open",rightOpen);
}
let toastTimer;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2500);
}

initFirebase();
</script>
